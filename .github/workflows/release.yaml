name: Release Build

# 触发条件：当你推送类似 "v0.1.0" 这样的 tag 时触发
on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: CurlFlow

jobs:
  # === 1. 构建 Windows 版本 ===
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23' # 根据你的 go.mod 版本调整
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows App
        # -clean 确保干净构建，-upx 使用压缩(可选), -nsis 生成安装包(如果有配置)
        run: wails build -platform windows/amd64 -clean -ldflags "-s -w"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bin
          path: build/bin/${{ env.APP_NAME }}.exe

  # === 2. 构建 Linux 版本 (Ubuntu) ===
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux Dependencies (Wails Prerequisites)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux App
        run: wails build -platform linux/amd64 -clean -ldflags "-s -w"

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: build/bin/${{ env.APP_NAME }}

  # === 3. 构建 macOS 版本 ===
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS App
        # macOS 需要生成 .app 包，使用 universal 生成通用二进制
        run: wails build -platform darwin/universal -clean -ldflags "-s -w"

      - name: Create DMG
        run: |
          echo "Listing build/bin contents for debugging:"
          ls -R build/bin
          
          # 动态查找 .app 文件，避免路径或名称不匹配问题
          APP_PATH=$(find build/bin -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in build/bin!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          
          # 使用 macOS 原生工具 hdiutil 生成 DMG
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder "$APP_PATH" -ov -format UDZO "build/bin/${{ env.APP_NAME }}-mac-universal.dmg"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-bin
          path: build/bin/${{ env.APP_NAME }}-mac-universal.dmg

  # === 4. 发布 Release ===
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Display structure of downloaded files
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-bin/${{ env.APP_NAME }}.exe
            linux-bin/${{ env.APP_NAME }}
            macos-bin/${{ env.APP_NAME }}-mac-universal.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}